name: Release migrator

# `lethe-migrate` is a one-shot legacy tool (migrates v0.18 LanceDB storage to
# the current SQLite-vec storage). It pulls LanceDB + Arrow + DataFusion — by
# far the heaviest compile in the repo — and it almost never changes. So it is
# decoupled from the main release: it builds only when its own `migrator-v*`
# tag is pushed, or when triggered by hand. Normal `v*` lethe releases skip it
# entirely (which is most of why they were slow).
on:
  push:
    tags:
      - "migrator-v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "10"
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build migrator ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            deps: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev pkg-config mold
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            deps: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev pkg-config mold
          - name: macos-aarch64
            runner: macos-14
            target: aarch64-apple-darwin
            deps: brew install protobuf

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: migrator
          cache-on-failure: "true"

      - name: Install native dependencies
        run: ${{ matrix.deps }}

      - name: Build lethe-migrate
        run: cargo build --release --locked --manifest-path migrator/Cargo.toml

      - name: Package lethe-migrate
        env:
          LETHE_RELEASE_TARGET: ${{ matrix.target }}
        run: scripts/package-migrator

      - uses: actions/upload-artifact@v4
        with:
          name: lethe-migrate-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish migrator release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
