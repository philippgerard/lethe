name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux gnu builds pin to ubuntu-24.04 (glibc 2.39) because the
          # prebuilt ort/onnxruntime binaries pulled in by fastembed
          # require `__isoc23_strtol*` symbols introduced in glibc 2.39.
          # End-user floor: Ubuntu 24.04+, Debian 13+, Fedora 40+,
          # RHEL/Rocky 10+. macOS binaries link only system libs and are
          # portable across recent macOS versions on the matching arch.
          - name: linux-x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            deps: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev pkg-config
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            deps: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev pkg-config
          - name: macos-x86_64
            runner: macos-13
            target: x86_64-apple-darwin
            deps: brew install protobuf
          - name: macos-aarch64
            runner: macos-14
            target: aarch64-apple-darwin
            deps: brew install protobuf

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # `migrator` is a separate Cargo project (its own [workspace]) so
      # cache it as a distinct workspace entry.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            migrator

      - name: Install native dependencies
        run: ${{ matrix.deps }}

      - name: Test lethe
        run: cargo test --locked

      - name: Test lethe-migrate
        run: cargo test --locked --manifest-path migrator/Cargo.toml

      - name: Build lethe
        run: cargo build --release --locked

      - name: Build lethe-migrate
        run: cargo build --release --locked --manifest-path migrator/Cargo.toml

      - name: Package lethe
        env:
          LETHE_RELEASE_TARGET: ${{ matrix.target }}
        run: scripts/package-release

      - name: Package lethe-migrate
        env:
          LETHE_RELEASE_TARGET: ${{ matrix.target }}
        run: scripts/package-migrator

      - uses: actions/upload-artifact@v4
        with:
          name: lethe-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
